name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

      - name: Check internal links
        run: |
          status=0
          for file in *.md; do
            # Find markdown links to .md files (not URLs)
            links=$(grep -oP '\[.*?\]\(\K[^)]+\.md(?=#|\))' "$file" 2>/dev/null || true)
            for link in $links; do
              # Strip any anchor
              target="${link%%#*}"
              if [ ! -f "$target" ]; then
                echo "BROKEN: $file -> $target"
                status=1
              fi
            done
          done
          exit $status
